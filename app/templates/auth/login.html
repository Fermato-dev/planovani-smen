<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení | FerMato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --fm-bg: #F8F7F5;
            --fm-bg-card: #ffffff;
            --fm-bg-input: #F4F4F2;
            --fm-border: #E8E8E8;
            --fm-text: #111111;
            --fm-text-secondary: #475569;
            --fm-text-muted: #94A3B8;
            --fm-primary: #0D9488;
            --fm-primary-dim: #0F766E;
            --fm-primary-glow: rgba(13, 148, 136, 0.10);
            --fm-radius: 10px;
            --fm-radius-lg: 16px;
            --fm-font: 'DM Sans', 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--fm-bg);
            color: var(--fm-text);
            font-family: var(--fm-font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(13, 148, 136, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13, 148, 136, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* Ambient glow */
        body::after {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(13, 148, 136, 0.06) 0%, transparent 70%);
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--fm-primary), var(--fm-primary-dim));
            border: 1px solid rgba(13, 148, 136, 0.15);
            margin-bottom: 1.25rem; box-shadow: 0 8px 24px rgba(13, 148, 136, 0.2);
        }
        .login-brand-icon i {
            font-size: 1.5rem;
            color: var(--fm-primary);
        }
        .login-brand h2 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0;
        }
        .login-brand p {
            color: var(--fm-text-muted);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .login-card {
            background: var(--fm-bg-card);
            border: 1px solid var(--fm-border);
            border-radius: var(--fm-radius-lg);
            padding: 2rem;
            box-shadow:
                0 4px 16px rgba(0,0,0,0.06),
                0 1px 3px rgba(0,0,0,0.04);
        }

        .login-card h5 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--fm-text-secondary);
            margin-bottom: 1.25rem;
        }

        .form-label {
            color: var(--fm-text-secondary);
            font-weight: 500;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-control {
            background: var(--fm-bg-input);
            border: 1px solid var(--fm-border);
            color: var(--fm-text);
            border-radius: var(--fm-radius);
            padding: 0.65rem 0.85rem;
            font-size: 0.88rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            background: var(--fm-bg-input);
            border-color: var(--fm-primary);
            color: var(--fm-text);
            box-shadow: 0 0 0 3px var(--fm-primary-glow);
        }
        .form-control::placeholder {
            color: var(--fm-text-muted);
        }

        .btn-login {
            background: var(--fm-primary);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.88rem;
            padding: 0.7rem 1rem;
            border-radius: var(--fm-radius);
            width: 100%;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }
        .btn-login:hover {
            background: var(--fm-primary-dim);
            box-shadow: 0 2px 12px rgba(13, 148, 136, 0.2);
            transform: translateY(-1px);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-radius: var(--fm-radius);
            font-size: 0.84rem;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .btn-close { filter: invert(1) brightness(200%); }

        /* Animation */
        .login-wrapper {
            animation: fadeUp 0.5s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::selection {
            background: var(--fm-primary);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <div class="login-brand-icon">
                <i class="bi bi-calendar3"></i>
            </div>
            <h2>FerMato Směny</h2>
            <p>Plánování směn</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endwith %}

        <div class="login-card">
            <h5><i class="bi bi-box-arrow-in-right"></i> Přihlášení</h5>
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Uživatelské jméno</label>
                    <input type="text" class="form-control" id="username"
                           name="username" value="{{ username|default('') }}"
                           required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Heslo</label>
                    <input type="password" class="form-control" id="password"
                           name="password" required>
                </div>
                <button type="submit" class="btn-login">
                    Přihlásit se
                </button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
