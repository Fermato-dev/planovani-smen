<div class="board-assign-panel">
  <div class="board-assign-panel-title">Přidat zaměstnance:</div>
  {% if employees %}
  <div class="d-flex flex-wrap gap-1 mb-1">
    {% for e in employees %}
    <form method="POST" action="{{ url_for('capacity.board_assign_to_task_view') }}" class="d-inline">
      <input type="hidden" name="week_start" value="{{ week_start }}">
      <input type="hidden" name="plan_id" value="{{ plan_id }}">
      <input type="hidden" name="date_str" value="{{ date_str }}">
      <input type="hidden" name="task_id" value="{{ task_id }}">
      <input type="hidden" name="employee_id" value="{{ e.id }}">
      <button type="submit" class="assign-emp-btn" style="background:#{{ e.color }}">{{ e.name }}</button>
    </form>
    {% endfor %}
  </div>
  {% else %}
  <small class="text-muted">Žádní dostupní zaměstnanci</small>
  {% endif %}

  {# Tlačítko pro zobrazení lidí z jiných oddělení #}
  {% if not show_all and other_count > 0 %}
  <button type="button" class="btn btn-link p-0 text-muted" style="font-size:.72rem"
      hx-get="{{ url_for('capacity.board_emp_panel', week_start=week_start, date_str=date_str, task_id=task_id) }}?show_all=1"
      hx-target="#emp-panel-{{ date_str }}-{{ task_id }}"
      hx-swap="innerHTML">
    <i class="bi bi-plus-circle"></i> {{ other_count }} dalších z jiných oddělení
  </button>
  {% elif show_all and other_count == 0 %}
  <button type="button" class="btn btn-link text-muted p-0" style="font-size:.72rem"
      hx-get="{{ url_for('capacity.board_emp_panel', week_start=week_start, date_str=date_str, task_id=task_id) }}"
      hx-target="#emp-panel-{{ date_str }}-{{ task_id }}"
      hx-swap="innerHTML">
    skrýt ostatní
  </button>
  {% endif %}

  <button type="button" class="btn btn-link text-muted p-0 ms-2" style="font-size:.75rem"
    onclick="document.getElementById('emp-panel-{{ date_str }}-{{ task_id }}').innerHTML=''">zavřít</button>
</div>
